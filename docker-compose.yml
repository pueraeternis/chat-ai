services:
  vllm:
    image: vllm/vllm-openai:${VLLM_IMAGE_TAG:-v0.12.0}
    container_name: vllm-llm
    restart: unless-stopped
    ipc: host
    shm_size: "8g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    ports:
      - "${VLLM_PORT:-19000}:8000"
    volumes:
      - type: bind
        source: ${HF_CACHE_ROOT}
        target: /root/.cache/huggingface
    command:
      [
        "Qwen/Qwen3-30B-A3B-Instruct-2507",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--served-model-name",
        "qwen3-30b-instruct",
        "--max-model-len",
        "32768",
        "--gpu-memory-utilization",
        "0.9",
        "--enable-auto-tool-choice",
        "--tool-call-parser",
        "hermes",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/models', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 900s

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.6.32
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${OPEN_WEBUI_PORT:-13000}:8080"
    environment:
      AIOHTTP_CLIENT_TIMEOUT: "600"
      OPENAI_API_BASE_URL: "http://vllm:8000/v1"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      ENABLE_OLLAMA_API: "false"
      HF_HUB_CACHE: /hf-hub
      HUGGINGFACE_HUB_CACHE: /hf-hub
      RAG_EMBEDDING_ENGINE: ""
      RAG_EMBEDDING_MODEL: "${RAG_EMBEDDING_MODEL}"
    volumes:
      - open-webui-data:/app/backend/data
      - type: bind
        source: ${HF_HUB_CACHE}
        target: /hf-hub
        read_only: true
    depends_on:
      vllm:
        condition: service_healthy

volumes:
  open-webui-data:

networks:
  default:
    name: chat-ai-stack
