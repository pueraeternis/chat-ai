services:
  triton:
    build: .
    image: chat-ai-triton:${TRITON_IMAGE_TAG:-local}
    container_name: triton-llm
    restart: unless-stopped
    ipc: host
    shm_size: "8589934592"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    ports:
      - "${TRITON_HTTP_PORT:-18100}:8000"
      - "${TRITON_GRPC_PORT:-18101}:8001"
      - "${TRITON_METRICS_PORT:-18102}:8002"
      - "${TRITON_OPENAI_PORT:-19000}:9000"
    volumes:
      - type: bind
        source: ${HF_CACHE_ROOT}
        target: /root/.cache/huggingface
      - type: bind
        source: ./models
        target: /models
        read_only: true
    command:
      [
        "python3",
        "/opt/tritonserver/python/openai/openai_frontend/main.py",
        "--model-repository=/models",
        "--tokenizer=${TRITON_TOKENIZER}",
        "--openai-port=9000",
        "--host=0.0.0.0",
      ]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/v1/models', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 900s

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.6.32
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${OPEN_WEBUI_PORT:-13000}:8080"
    environment:
      AIOHTTP_CLIENT_TIMEOUT: "600"
      OPENAI_API_BASE_URL: "http://triton:9000/v1"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      ENABLE_OLLAMA_API: "false"
      HF_HUB_CACHE: /hf-hub
      HUGGINGFACE_HUB_CACHE: /hf-hub
      RAG_EMBEDDING_ENGINE: ""
      RAG_EMBEDDING_MODEL: "${RAG_EMBEDDING_MODEL}"
    volumes:
      - open-webui-data:/app/backend/data
      - type: bind
        source: ${HF_HUB_CACHE}
        target: /hf-hub
        read_only: true
    depends_on:
      triton:
        condition: service_healthy

volumes:
  open-webui-data:

networks:
  default:
    name: chat-ai-stack
